<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga-Pdf-Maker</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <div class="form-group">
        <label for="baseUrl">Base URL</label>
        <input type="text" id="baseUrl" placeholder="https://comics.vn/" value="https://comics.vn/">
      </div>

      <div class="form-group">
        <label for="imageUrlFilter">Image Url Filter</label>
        <input type="text" id="imageUrlFilter" placeholder='CSS selector (e.g., div[class="page-break"]) or text filter'>
      </div>

      <div class="form-group">
        <label>GroupBy</label>
        <div class="groupby-options">
          <button class="groupby-btn" data-value="1">1</button>
          <button class="groupby-btn active" data-value="2">2</button>
          <button class="groupby-btn" data-value="5">5</button>
          <button class="groupby-btn" data-value="10">10</button>
          <button class="groupby-btn" data-value="all">All</button>
        </div>
      </div>

      <div class="form-group">
        <label for="numParts">Or specify number of parts</label>
        <input type="number" id="numParts" min="1" max="100" placeholder="e.g., 3" class="num-parts-input">
      </div>

      <div class="form-group">
        <label for="urlsChapter">URL's chapters</label>
        <textarea id="urlsChapter" rows="15" placeholder="Paste HTML with <a> tags here, or enter CSS selector (e.g., a.chapter-link)"></textarea>
      </div>
    </div>

    <div class="right-panel">
      <div class="form-group">
        <label for="mangaTitle">Manga Title</label>
        <input type="text" id="mangaTitle" placeholder="Enter manga title for PDF filename...">
      </div>
      
      <div class="chapters-header">
        <h3>Chapters</h3>
        <div class="header-actions">
          <button id="revertListBtn" class="revert-btn">Revert List</button>
          <button id="autoDownloadBtn" class="auto-download-btn">Auto-Download</button>
        </div>
      </div>
      <div id="partsSummary"></div>
      <div id="chaptersList"></div>
    </div>
  </div>

  <script src="lib/jspdf.umd.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
